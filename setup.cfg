[flake8]
max-line-length = 100
exclude = .venv,migrations

[isort]
profile = black
known_django = django
known_third_party = rest_framework,channels,celery,langchain,langgraph,pydantic
sections = FUTURE,STDLIB,DJANGO,THIRDPARTY,FIRSTPARTY,LOCALFOLDER
src_paths = apps,config

[mypy]
python_version = 3.12
ignore_missing_imports = True
