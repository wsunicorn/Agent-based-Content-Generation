services:
  - type: keyvalue
    name: content-pipeline-redis
    plan: free
    region: singapore
    ipAllowList: []

  - type: web
    name: content-pipeline-web
    runtime: docker
    plan: starter
    region: singapore
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: bash scripts/start-web.sh
    healthCheckPath: /api/health/
    maxShutdownDelaySeconds: 120
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: SECURE_SSL_REDIRECT
        value: "False"
      - key: APP_BASIC_AUTH_ENABLED
        value: "True"
      - key: APP_BASIC_AUTH_USERNAME
        value: admin
      - key: APP_BASIC_AUTH_PASSWORD
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: content-pipeline-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: content-pipeline-redis
          property: connectionString
      - key: CACHE_URL
        fromService:
          type: keyvalue
          name: content-pipeline-redis
          property: connectionString

  - type: worker
    name: content-pipeline-worker
    runtime: docker
    plan: starter
    region: singapore
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: bash scripts/start-worker.sh
    maxShutdownDelaySeconds: 300
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        fromService:
          type: web
          name: content-pipeline-web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: content-pipeline-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: content-pipeline-redis
          property: connectionString
      - key: CACHE_URL
        fromService:
          type: keyvalue
          name: content-pipeline-redis
          property: connectionString
      - key: CELERY_WORKER_POOL
        value: solo
      - key: CELERY_WORKER_CONCURRENCY
        value: "1"
      - key: LLM_PROVIDER
        value: gemini
      - key: LLM_MODE
        value: cheap
      - key: PIPELINE_QUALITY_MODE
        value: fast
      - key: FAST_MODE_WEB_SEARCH
        value: "True"
      - key: FAST_MODE_LLM_QA
        value: "True"
      - key: FAST_MODE_LLM_SEO
        value: "True"
      - key: GOOGLE_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false

databases:
  - name: content-pipeline-db
    plan: free
    region: singapore
    postgresMajorVersion: "16"
    databaseName: content_pipeline
    user: content_user
